name: Build NewTerm iOS 6

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build NewTerm (iOS 6.0)
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Theos dependencies
      run: |
        brew install make dpkg libffi

    - name: Setup Theos
      run: |
        git clone --recursive --depth 1 https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH
        
    - name: Download iOS 6.0 SDK
      run: |
        mkdir -p $THEOS/sdks
        echo "=== Downloading iPhoneOS6.0 SDK ==="
        cd /tmp
        curl -L -o iPhoneOS6.0.sdk.zip "https://github.com/GrowtopiaJaw/iPhoneOS-SDK/releases/download/v1.0/iPhoneOS6.0.sdk.zip"
        echo "Downloaded file:"
        ls -lh iPhoneOS6.0.sdk.zip
        echo ""
        echo "Unzipping..."
        unzip iPhoneOS6.0.sdk.zip
        echo ""
        echo "=== All files after unzip (recursive) ==="
        find . -type f | head -30
        echo ""
        echo "=== All .sdk folders (recursive, any depth) ==="
        find . -type d -name "*.sdk"
        echo ""
        
        # Find the SDK folder at any depth
        SDK_FOLDER=$(find . -type d -name "*.sdk" | head -1 | sed 's|^\./||')
        echo "Found SDK folder path: $SDK_FOLDER"
        
        if [ -n "$SDK_FOLDER" ]; then
          echo "Creating $THEOS/sdks/iPhoneOS6.0.sdk"
          mkdir -p $THEOS/sdks/iPhoneOS6.0.sdk
          echo "Copying contents..."
          cp -r "$SDK_FOLDER"/. $THEOS/sdks/iPhoneOS6.0.sdk/
          rm -rf iPhoneOS6.0.sdk.zip
        else
          echo "ERROR: No .sdk folder found!"
          ls -laR | head -50
          exit 1
        fi
        
        echo ""
        echo "=== SDKs in THEOS ==="
        ls -la $THEOS/sdks/
        echo ""
        echo "SDK size:"
        du -sh $THEOS/sdks/iPhoneOS6.0.sdk

    - name: Build NewTerm
      run: |
        echo "THEOS: $THEOS"
        echo "THEOS_PROJECT_DIR: $THEOS_PROJECT_DIR"
        echo "=== Available SDKs ==="
        ls -la $THEOS/sdks/
        echo ""
        export THEOS_PROJECT_DIR=$PWD
        export PATH="$HOME/theos/bin:$PATH"
        which gmake
        gmake package FINALVERSION=1.0.0 IPHONEOS_DEPLOYMENT_TARGET=6.0
        ls -la packages/

    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        name: newterm-ios6
        path: packages/*.deb
