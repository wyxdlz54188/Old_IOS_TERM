name: Build NewTerm iOS 6

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build NewTerm (iOS 6.0)
    runs-on: macos-12
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Theos dependencies
      run: |
        brew install make dpkg

    - name: Setup Theos
      run: |
        git clone --recursive --depth 1 https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH
        echo "THEOS_PROJECT_DIR=$PWD" >> $GITHUB_ENV

    - name: Download iOS SDKs
      run: |
        mkdir -p $THEOS/sdks
        curl -L "https://github.com/xybp888/iOS-SDKs/archive/refs/heads/master.tar.gz" -o /tmp/sdks.tar.gz
        tar -xzf /tmp/sdks.tar.gz -C $THEOS/sdks --strip-components=1
        rm /tmp/sdks.tar.gz
        ls -la $THEOS/sdks/

    - name: Build NewTerm
      run: |
        export THEOS_PROJECT_DIR=$PWD
        gmake package FINALVERSION=1.0.0
        ls -la packages/

    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        name: newterm-ios6
        path: packages/*.deb
